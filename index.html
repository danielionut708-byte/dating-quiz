<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dating Chat</title>

<style>

body{
  margin:0;
  background:#0f0f0f;
  font-family:Arial,sans-serif;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.phone{
  width:100%;
  max-width:420px;
  height:100vh;
  background:#111;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  background:#1b1b1b;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid #222;
}

.avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  background:url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400') center/cover;
  filter:blur(1px);
}

.name{
  font-weight:bold;
}

.online{
  color:#47d764;
  font-size:13px;
}

.chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:80%;
  padding:14px;
  border-radius:18px;
  line-height:1.4;
  animation:fade .3s ease;
}

.bot{
  background:#262626;
  align-self:flex-start;
}

.user{
  background:#ff3f7f;
  align-self:flex-end;
}

.answers{
  padding:15px;
  background:#161616;
  border-top:1px solid #222;
}

.answers button{
  width:100%;
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:16px;
  background:#ff3f7f;
  color:white;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}

.match-card{
  background:#1d1d1d;
  border-radius:20px;
  padding:12px;
  margin-top:10px;
}

.blur-photo{
  width:100%;
  height:220px;
  border-radius:18px;
  background:url('https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=600') center/cover;
  filter:blur(6px);
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="phone">

<div class="header">
  <div class="avatar"></div>

  <div>
    <div class="name">Emma, 24</div>
    <div class="online">online acum</div>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="answers" id="answers"></div>

</div>

<script>

const questions = [

{
q:'Hei ❤️ Ce cauți aici?',
a:['Relație serioasă','Casual','Prieteni noi']
},

{
q:'Ce vârstă ai?',
a:['18-24','25-30','31+']
},

{
q:'Din ce oraș ești?',
a:[
'Alba Iulia',
'Arad',
'Bacău',
'Baia Mare',
'Bistrița',
'Botoșani',
'Brașov',
'Brăila',
'București',
'Buzău',
'Călărași',
'Cluj-Napoca',
'Constanța',
'Craiova',
'Deva',
'Focșani',
'Galați',
'Giurgiu',
'Iași',
'Oradea',
'Piatra Neamț',
'Pitești',
'Ploiești',
'Râmnicu Vâlcea',
'Reșița',
'Satu Mare',
'Sibiu',
'Slatina',
'Suceava',
'Târgu Jiu',
'Târgu Mureș',
'Timișoara',
'Tulcea',
'Vaslui',
'Zalău',
'Alt oraș'
]
},

{
q:'Cât de des ieși la întâlniri?',
a:['Des','Uneori','Rar']
}

];

let current = 0;

const chat = document.getElementById('chat');
const answers = document.getElementById('answers');

function addMessage(text,type='bot'){

  const div = document.createElement('div');

  div.className = 'msg ' + type;

  div.innerHTML = text;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

function showAnswers(arr){

  answers.innerHTML='';

  arr.forEach(ans=>{

    const btn = document.createElement('button');

    btn.innerText = ans;

    btn.onclick = ()=>{

      addMessage(ans,'user');

      answers.innerHTML='';

      setTimeout(()=>{

        nextQuestion();

      },700);

    };

    answers.appendChild(btn);

  });

}

function nextQuestion(){

  current++;

  if(current >= questions.length){

    addMessage('Compatibilitatea ta este 87% ❤️');

    setTimeout(()=>{

      const card = document.createElement('div');

      card.className = 'match-card';

      card.innerHTML = `
        <div class="blur-photo"></div>

        <p style="
          margin-top:10px;
          font-size:18px;
          line-height:1.5;
        ">
          Emma este interesată să continue conversația cu tine ❤️
        </p>
      `;

      chat.appendChild(card);

      chat.scrollTop = chat.scrollHeight;

      answers.innerHTML = `
        <button onclick="openOffers()" style="
          width:100%;
          padding:18px;
          border:none;
          border-radius:18px;
          background:linear-gradient(135deg,#ff3f7f,#ff6b9d);
          color:white;
          font-size:17px;
          font-weight:bold;
          cursor:pointer;
          box-shadow:0 8px 25px rgba(255,63,127,0.25);
        ">
          Continuă conversația ❤️
        </button>
      `;

    },1000);

    return;
  }

  addMessage(questions[current].q,'bot');

  showAnswers(questions[current].a);

}

function openOffers(){

  var script1 = document.createElement('script');

  script1.type = 'text/javascript';

  script1.innerHTML =
  'var dFtlM_zJN_zhysxc={"it":4608816,"key":"e0766"};';

  document.body.appendChild(script1);

  var script2 = document.createElement('script');

  script2.src =
  'https://d1g1lhd4vferpn.cloudfront.net/303e95b.js';

  document.body.appendChild(script2);

  setTimeout(function(){

    if(typeof _kt === 'function'){
      _kt();
    }

  },1200);

}

setTimeout(()=>{

  addMessage(questions[0].q,'bot');

  showAnswers(questions[0].a);

},1000);

</script>

</body>
</html>
